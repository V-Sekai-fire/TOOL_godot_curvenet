name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lean-and-slang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache .elan + lake-packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            lean/.lake/packages
            lean/.lake/build
          key: elan-lake-${{ hashFiles('lean/lean-toolchain', 'lean/lake-manifest.json') }}

      - name: Install elan / Lean
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Slang toolchain
        uses: actions/cache@v4
        with:
          path: bin/.slang
          key: slang-${{ hashFiles('misc/install-slang.sh') }}

      - name: Fetch slangc
        run: |
          if [ ! -x bin/.slang/bin/slangc ]; then
            misc/install-slang.sh
          fi
          bin/slangc -v

      - name: lake build (slangc available so axpy_native links)
        working-directory: lean
        run: lake build

      - name: Emit every Slang kernel
        working-directory: lean
        run: |
          mkdir -p /tmp/emitted_shaders
          lake exe emit_shaders /tmp/emitted_shaders

      - name: slangc -target spirv round-trip on all kernels
        run: |
          ok=0; total=0; failed=
          for f in /tmp/emitted_shaders/*.slang; do
            total=$((total+1))
            spv="${f%.slang}.spv"
            if bin/slangc -target spirv -profile sm_6_5 -stage compute \
                 -entry main -o "$spv" "$f" 2>/tmp/slangc_err.log; then
              magic=$(xxd -l 4 -p "$spv")
              size=$(stat -c%s "$spv")
              if [ "$magic" = "03022307" ] && [ "$size" -gt 100 ]; then
                ok=$((ok+1))
              else
                failed="$failed $(basename "$f"):bad-spirv"
              fi
            else
              failed="$failed $(basename "$f"):slangc-fail"
              cat /tmp/slangc_err.log | head -5
            fi
          done
          echo "$ok / $total kernels round-trip to SPIR-V"
          if [ -n "$failed" ]; then
            echo "FAILED:$failed"
            exit 1
          fi

      - name: Real-input validators (slangc -target cpp + clang + run)
        run: make -C tests/slang_validate test

      - name: Lean equivalence proofs (spec ≡ slangc-emitted kernel)
        working-directory: lean
        run: |
          lake build axpy_validate
          lake exe  axpy_validate

  metal:
    # Apple Silicon runner — Metal API is paravirtualized through to the M1
    # GPU. Intel macos runners (macos-13 and earlier) lack GPU passthrough;
    # this job MUST stay on macos-14 / macos-latest.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache .elan + lake-packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            lean/.lake/packages
            lean/.lake/build
          key: elan-lake-mac-${{ hashFiles('lean/lean-toolchain', 'lean/lake-manifest.json') }}

      - name: Install elan / Lean
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Slang toolchain (macOS aarch64)
        uses: actions/cache@v4
        with:
          path: bin/.slang
          key: slang-mac-${{ hashFiles('misc/install-slang.sh') }}

      - name: Fetch slangc
        run: |
          if [ ! -x bin/.slang/bin/slangc ]; then
            misc/install-slang.sh
          fi
          bin/slangc -v

      - name: lake build (slangc available so axpy_native links)
        working-directory: lean
        run: lake build

      - name: Emit every Slang kernel
        working-directory: lean
        run: |
          mkdir -p /tmp/emitted_shaders
          lake exe emit_shaders /tmp/emitted_shaders

      - name: Verify metal toolchain available
        run: |
          xcrun -sdk macosx metal --version
          xcrun -sdk macosx metallib --version

      - name: slangc -target metal + xcrun metal + xcrun metallib (every kernel)
        run: |
          # Three known-bad kernels under the current Slang Metal target —
          # filed as upstream issues, not blockers for the SPIR-V path.
          #
          # direct_delta_mush — slangc internal error
          #   "Unknown addressspace encountered" when emitting Metal for
          #   our float4x4 + multi-buffer index pattern. SPIR-V target
          #   compiles cleanly; bug is Metal-codegen-side in slangc.
          # dot_reduce, dot_reduce_multi — `precise` keyword
          #   HLSL `precise` (SPIR-V NoContraction) translates to a
          #   no-op in MSL, but Slang emits it literally and Apple's
          #   Metal compiler rejects `precise` as a local-decl qualifier
          #   ("unexpected namespace name 'precise'"). Either rewrite
          #   the EFT primitives without `precise` (defeats the
          #   purpose) or wait on slangc to lower precise away on the
          #   Metal target.
          KNOWN_BAD="direct_delta_mush dot_reduce dot_reduce_multi"

          is_known_bad() {
            for x in $KNOWN_BAD; do [ "$x" = "$1" ] && return 0; done
            return 1
          }

          ok=0; total=0; skipped=0; failed=
          mkdir -p /tmp/metal_out
          for f in /tmp/emitted_shaders/*.slang; do
            total=$((total+1))
            name="$(basename "$f" .slang)"
            if is_known_bad "$name"; then
              skipped=$((skipped+1))
              echo "SKIP  $name (tracked in CI comment)"
              continue
            fi
            metal_src="/tmp/metal_out/${name}.metal"
            air="/tmp/metal_out/${name}.air"
            lib="/tmp/metal_out/${name}.metallib"

            if ! bin/slangc -target metal -stage compute -entry main \
                   -o "$metal_src" "$f" 2>/tmp/slangc_metal.log; then
              failed="$failed ${name}:slangc-metal"
              cat /tmp/slangc_metal.log | head -5
              continue
            fi
            if ! xcrun -sdk macosx metal -c "$metal_src" -o "$air" 2>/tmp/metal_compile.log; then
              failed="$failed ${name}:xcrun-metal"
              cat /tmp/metal_compile.log | head -5
              continue
            fi
            if ! xcrun -sdk macosx metallib "$air" -o "$lib" 2>/tmp/metallib.log; then
              failed="$failed ${name}:metallib"
              cat /tmp/metallib.log | head -5
              continue
            fi

            # Apple .metallib magic: ASCII "MTLB" = 0x424c544d little-endian
            # which xxd prints as 4d544c42.
            magic=$(xxd -l 4 -p "$lib")
            size=$(stat -f%z "$lib")
            if [ "$magic" = "4d544c42" ] && [ "$size" -gt 100 ]; then
              ok=$((ok+1))
            else
              failed="$failed ${name}:bad-metallib(size=$size,magic=$magic)"
            fi
          done
          echo "$ok / $((total - skipped)) kernels compile to .metallib (skipped $skipped)"
          if [ -n "$failed" ]; then
            echo "FAILED:$failed"
            exit 1
          fi

      - name: Lean equivalence proofs (Apple Silicon)
        working-directory: lean
        run: |
          lake build axpy_validate
          lake exe  axpy_validate
