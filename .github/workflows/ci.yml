name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # the artifact-link comment step uses this

jobs:
  validate:
    # macos-14 (Apple Silicon) covers everything: Lean's lake build, the
    # SPIR-V round-trip via slangc, the slang_validate harness, the
    # axpy_validate FFI equivalence proof, AND the Slang -> Metal AOT
    # compile chain that needs xcrun metal. macos-13 Intel runners lack
    # GPU paravirtualization, so we stay on macos-14 / macos-latest.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Cache .elan + lake-packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.elan
            lean/.lake/packages
            lean/.lake/build
          key: elan-lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean/lean-toolchain', 'lean/lake-manifest.json') }}

      - name: Install elan / Lean
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Slang toolchain
        uses: actions/cache@v5
        with:
          path: bin/.slang
          # OS + arch is essential here — slangc is a native binary, so a
          # cache populated by a Linux runner is unusable on macOS aarch64
          # and vice versa.
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('misc/install-slang.sh') }}

      - name: Fetch slangc
        run: |
          if [ ! -x bin/.slang/bin/slangc ]; then
            misc/install-slang.sh
          fi
          bin/slangc -v

      - name: lake build
        working-directory: lean
        run: lake build

      - name: Emit every Slang kernel
        working-directory: lean
        run: |
          mkdir -p /tmp/emitted_shaders
          lake exe emit_shaders /tmp/emitted_shaders

      - name: Layer 1 — slangc -target spirv round-trip on every kernel
        run: |
          ok=0; total=0; failed=
          for f in /tmp/emitted_shaders/*.slang; do
            total=$((total+1))
            spv="${f%.slang}.spv"
            if bin/slangc -target spirv -profile sm_6_5 -stage compute \
                 -entry main -o "$spv" "$f" 2>/tmp/slangc_err.log; then
              magic=$(xxd -l 4 -p "$spv")
              size=$(stat -f%z "$spv")
              if [ "$magic" = "03022307" ] && [ "$size" -gt 100 ]; then
                ok=$((ok+1))
              else
                failed="$failed $(basename "$f"):bad-spirv"
              fi
            else
              failed="$failed $(basename "$f"):slangc-fail"
              cat /tmp/slangc_err.log | head -5
            fi
          done
          echo "$ok / $total kernels round-trip to SPIR-V"
          if [ -n "$failed" ]; then
            echo "FAILED:$failed"
            exit 1
          fi

      - name: Verify metal toolchain available
        run: |
          xcrun -sdk macosx metal --version
          xcrun -sdk macosx metallib --version

      - name: Layer 2 — slangc -target metal + xcrun metal + xcrun metallib
        run: |
          # direct_delta_mush hits an upstream slangc internal error
          # on the Metal target ("Unknown addressspace encountered")
          # when emitting our float4x4 + multi-buffer index pattern.
          # SPIR-V target compiles cleanly; bug is Metal-codegen-side
          # in slangc.
          KNOWN_BAD="direct_delta_mush"

          is_known_bad() {
            for x in $KNOWN_BAD; do [ "$x" = "$1" ] && return 0; done
            return 1
          }

          ok=0; total=0; skipped=0; failed=
          mkdir -p /tmp/metal_out
          for f in /tmp/emitted_shaders/*.slang; do
            total=$((total+1))
            name="$(basename "$f" .slang)"
            if is_known_bad "$name"; then
              skipped=$((skipped+1))
              echo "SKIP  $name (tracked in CI comment)"
              continue
            fi
            metal_src="/tmp/metal_out/${name}.metal"
            air="/tmp/metal_out/${name}.air"
            lib="/tmp/metal_out/${name}.metallib"

            if ! bin/slangc -target metal -stage compute -entry main \
                   -o "$metal_src" "$f" 2>/tmp/slangc_metal.log; then
              failed="$failed ${name}:slangc-metal"
              cat /tmp/slangc_metal.log | head -5
              continue
            fi
            if ! xcrun -sdk macosx metal -c "$metal_src" -o "$air" 2>/tmp/metal_compile.log; then
              failed="$failed ${name}:xcrun-metal"
              cat /tmp/metal_compile.log | head -5
              continue
            fi
            if ! xcrun -sdk macosx metallib "$air" -o "$lib" 2>/tmp/metallib.log; then
              failed="$failed ${name}:metallib"
              cat /tmp/metallib.log | head -5
              continue
            fi

            # Apple .metallib magic: ASCII "MTLB" = 0x424c544d little-endian
            # which xxd prints as 4d544c42.
            magic=$(xxd -l 4 -p "$lib")
            size=$(stat -f%z "$lib")
            if [ "$magic" = "4d544c42" ] && [ "$size" -gt 100 ]; then
              ok=$((ok+1))
            else
              failed="$failed ${name}:bad-metallib(size=$size,magic=$magic)"
            fi
          done
          echo "$ok / $((total - skipped)) kernels compile to .metallib (skipped $skipped)"
          if [ -n "$failed" ]; then
            echo "FAILED:$failed"
            exit 1
          fi

      - name: Layer 3 — slangc -target cpp + clang + run on known inputs
        run: make -C tests/slang_validate test

      - name: Layer 4 — Lean equivalence (spec = slangc-emitted kernel)
        working-directory: lean
        run: |
          lake build axpy_validate
          lake exe  axpy_validate

      - name: Build the Mire .glb (LeanGltf + EXT_structural_metadata)
        run: |
          mkdir -p /tmp/mire
          misc/mire_h_to_bin.py tests/mire_body_70k_data.h /tmp/mire
          cd lean && lake exe mire_to_gltf \
            /tmp/mire/positions.f32 /tmp/mire/tris.i32 /tmp/mire/mire.glb

      - name: Upload Mire .glb as workflow artifact
        id: upload-mire
        uses: actions/upload-artifact@v5
        with:
          name: mire-glb
          path: /tmp/mire/mire.glb
          retention-days: 30
          if-no-files-found: error

      - name: Comment on PR with nightly.link to the .glb
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"
          ART_ID="${{ steps.upload-mire.outputs.artifact-id }}"
          NIGHTLY_RUN="https://nightly.link/${REPO}/actions/runs/${RUN_ID}/mire-glb.zip"
          NIGHTLY_ART="https://nightly.link/${REPO}/actions/artifacts/${ART_ID}.zip"
          ACTIONS_RUN="https://github.com/${REPO}/actions/runs/${RUN_ID}"

          BODY=$(cat <<MSG
          <!-- mire-glb-link -->
          ### Mire .glb artifact

          - **Direct download (no GitHub login):** [\`mire-glb.zip\`](${NIGHTLY_ART}) (via [nightly.link](https://nightly.link)).
          - Same artifact, run-scoped: [\`mire-glb.zip\` for this run](${NIGHTLY_RUN}).
          - GitHub Actions run page: [run #${RUN_ID}](${ACTIONS_RUN}).

          The zip contains \`mire.glb\` — 81,613 verts × 159,296 tris assembled by \`lake exe mire_to_gltf\`, with the Cesium \`EXT_structural_metadata\` schema (\`Curvenet\` / \`Segment\` / \`Knot\` / \`Sample\` / \`DDMWeights\`) declared in the JSON chunk.
          MSG
          )

          # Replace any previous bot comment that has the marker.
          PR_NUM="${{ github.event.pull_request.number }}"
          EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
                       --jq '[.[] | select(.body | contains("<!-- mire-glb-link -->"))][0].id')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING}" \
              -f body="${BODY}" >/dev/null
            echo "Updated comment $EXISTING"
          else
            gh pr comment "$PR_NUM" --body "${BODY}"
          fi
